<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <title>Обновление - Candle Light</title>
    <link rel="stylesheet" href="styles/style.css?v=20260619" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="app-kicker">
            ESP32S3Zero / IS31FL3731 16x9 Charlieplexed PWM LED I2C Driver / LED
            Matrix
          </p>
          <h1>Обновление</h1>
          <p class="app-subtitle">Загрузка прошивки и LittleFS</p>
        </div>
        <nav class="nav-links main-menu" aria-label="Основное меню">
          <a class="sun-link" href="index.html">Главная</a>
          <a class="sun-link" href="settings.html">Настройки</a>
          <a class="sun-link sun-link--active" href="update.html">Обновление</a>
          <a class="sun-link" href="anim.html">Матрица</a>
          <a class="sun-link" href="sun.html">Солнце</a>
          <a class="sun-link" href="moon.html">Луна</a>
        </nav>
      </header>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>

      <section class="panel update-panel page-panel">
        <div class="panel-head">
          <div>
            <p class="panel-label">Обновление</p>
            <h2>Обновление устройства</h2>
          </div>
          <span id="updateVersion" class="badge">v--</span>
        </div>

        <div class="update-files">
          <label class="file-picker">
            <span>Прошивка</span>
            <input
              type="file"
              id="firmwareFile"
              accept=".bin,application/octet-stream"
            />
            <small id="firmwareFileMeta">Файл не выбран</small>
          </label>
          <label class="file-picker">
            <span>LittleFS</span>
            <input
              type="file"
              id="filesystemFile"
              accept=".bin,application/octet-stream"
            />
            <small id="filesystemFileMeta">Файл не выбран</small>
          </label>
        </div>

        <div class="update-warning">
          После загрузки обоих файлов устройство перезагрузится, а Web UI сам
          обновит страницу.
        </div>
        <button class="btn" type="button" id="updateBtn">
          Обновить устройство
        </button>
        <progress
          id="updateProgress"
          class="update-progress"
          value="0"
          max="100"
        ></progress>
        <div id="updateStatus" class="update-status"></div>
      </section>
    </main>
    <script src="locales/ru/common.js?v=20260619"></script>
    <script src="locales/ru/update.js?v=20260619"></script>
    <script src="scripts/core.js?v=20260619"></script>
    <script src="scripts/update.js?v=20260619"></script>
    <script src="scripts/app.js?v=20260619"></script>
  </body>
</html>
